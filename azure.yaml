# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: viper
metadata:
  template: viper@1.0.0

# Inherit environment variables from the .env file located at the repository root.
# These values are passed to the infrastructure-as-code templates and container apps.
infra:
  provider: bicep
  path: infra
  module: main

services:
  backend:
    project: .
    language: python
    host: containerapp
    docker:
      path: Dockerfile.backend
      context: .
      remoteBuild: true
  frontend:
    project: src/ui
    language: js
    host: containerapp
    docker:
      path: ../../Dockerfile.frontend
      context: ../..
      remoteBuild: true

hooks:
  # Validate that azd environment values are selected before provisioning.
  # Use `azd env set --file .env` to import local values; hooks intentionally
  # avoid sourcing `.env` so stale local files cannot override azd state.
  preprovision:
    posix:
      shell: sh
      run: |
        azd env get-value AZURE_ENV_NAME >/dev/null
    windows:
      shell: pwsh
      run: |
        azd env get-value AZURE_ENV_NAME | Out-Null

  # Configure ACR pull after Container Apps identities and role assignments exist.
  # Uses scripts/postprovision.py (AzureDeveloperCliCredential) instead of az CLI
  # so that az login is not required — azd authentication is sufficient.
  postprovision:
    posix:
      shell: sh
      run: python scripts/postprovision.py
    windows:
      shell: pwsh
      run: python scripts/postprovision.py

  # Keep selected azd environment available before deployment.
  predeploy:
    posix:
      shell: sh
      run: |
        azd env get-value AZURE_ENV_NAME >/dev/null
    windows:
      shell: pwsh
      run: |
        azd env get-value AZURE_ENV_NAME | Out-Null
